name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run TypeScript tests
      run: npm run test
    
    - name: Run Go tests
      working-directory: ./sdlc-tool
      run: go test ./...
    
    - name: Type check
      run: npm run typecheck

  build-binaries:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            target: darwin-arm64
          - os: macos-latest
            arch: amd64
            target: darwin-amd64
          - os: ubuntu-latest
            arch: arm64
            target: linux-arm64
          - os: ubuntu-latest
            arch: amd64
            target: linux-amd64
          - os: windows-latest
            arch: amd64
            target: windows-amd64
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Build binary
      working-directory: ./sdlc-tool
      run: |
        GOOS=${{ matrix.target }} GOARCH=${{ matrix.arch }} go build -o ../sdlc-tool-${{ matrix.target }}${{ matrix.target == 'windows-amd64' && '.exe' || '' }}
      shell: bash
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: sdlc-tool-${{ matrix.target }}
        path: sdlc-tool-${{ matrix.target }}${{ matrix.target == 'windows-amd64' && '.exe' || '' }}

  create-release:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: ./artifacts
    
    - name: Generate checksums
      run: |
        cd ./artifacts
        for dir in */; do
          mv "${dir}"* ../
        done
        cd ..
        sha256sum sdlc-tool-* > checksums.txt
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          sdlc-tool-*
          checksums.txt
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
