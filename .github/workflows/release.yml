name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm run test

    - name: Type check
      run: npm run typecheck

  build-and-release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: npm ci

    - name: Build plugin bundle
      run: bun run build

    - name: Build release tarball
      run: |
        VERSION="${GITHUB_REF_NAME}"
        STAGING="convergentcode-${VERSION}"
        mkdir -p "$STAGING"

        cp dist/convergentcode.js "$STAGING/"
        cp -r .opencode "$STAGING/.opencode"
        cp -r templates "$STAGING/templates"
        cp install.sh "$STAGING/"
        cp README.md "$STAGING/"
        cp LICENSE "$STAGING/"

        tar czf "convergentcode-${VERSION}.tar.gz" "$STAGING"
        rm -rf "$STAGING"

    - name: Generate checksums
      run: sha256sum convergentcode-*.tar.gz > checksums.txt

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          convergentcode-*.tar.gz
          checksums.txt
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
